name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake (x64)
        run: cmake -B build64 -G "Visual Studio 17 2022" -A x64

      - name: Build (x64)
        run: cmake --build build64 --config Release

      - name: Configure CMake (x86 - DLL only)
        run: cmake -B build32 -G "Visual Studio 17 2022" -A Win32

      - name: Build (x86 - DLL only)
        run: cmake --build build32 --config Release --target veh-debugger

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: veh-debugger-win64
          path: |
            build64/bin/Release/veh-debug-adapter.exe
            build64/bin/Release/vcruntime_net.dll
            build32/bin/Release/vcruntime_net32.dll

  build-extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Compile
        run: npm run compile
